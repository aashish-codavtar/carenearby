version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# CareNearby – Docker Compose
#
# Development:   docker compose up -d
# Production:    cp .env.example .env  →  fill in real values  →  docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Node.js API ─────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: carenearby-api
    expose:
      - "3000"          # Only accessible inside Docker network
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: carenearby-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: carenearby-nginx
    ports:
      - "80:80"
      - "443:443"     # SSL – mount certs in nginx/certs/ and uncomment in nginx.conf
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # For Let's Encrypt / SSL certs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mongo_data:
