# ─────────────────────────────────────────────────────────────────────────────
# CareNearby – Nginx Reverse Proxy
#
# Production deployment notes:
#   1. Point your domain DNS to this server's IP
#   2. Install Certbot: sudo apt install certbot python3-certbot-nginx
#   3. Run: sudo certbot --nginx -d api.carenearby.ca
#   4. Certbot will auto-update this file with SSL directives
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  # ── Upstream API ─────────────────────────────────────────────────────────
  upstream carenearby_api {
    server carenearby-api:3000;
    keepalive 16;
  }

  # ── Rate limiting zones ───────────────────────────────────────────────────
  # Auth endpoints: 10 req/min per IP
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
  # General API: 60 req/min per IP
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

  # ── Connection limiting ───────────────────────────────────────────────────
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── Optimisation ─────────────────────────────────────────────────────────
  sendfile       on;
  tcp_nopush     on;
  tcp_nodelay    on;
  keepalive_timeout 65;
  client_max_body_size 1m;
  server_tokens off;   # Hide nginx version number

  # ── HTTP → redirect to same (or just serve HTTP for now) ─────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options         "DENY"            always;
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer"     always;

    # Connection limit per IP
    limit_conn addr 20;

    # Health-check endpoint (no rate limit – used by Docker healthcheck)
    location = /health {
      proxy_pass         http://carenearby_api/health;
      proxy_set_header   Host $host;
      access_log         off;
    }

    # Auth endpoints – tighter rate limit
    location /auth/ {
      limit_req  zone=auth_zone burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://carenearby_api;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # General API
    location / {
      limit_req  zone=api_zone burst=20 nodelay;
      limit_req_status 429;

      proxy_pass         http://carenearby_api;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── HTTPS (uncomment after running Certbot) ─────────────────────────────
    # return 301 https://$host$request_uri;
  }

  # ── HTTPS server (uncomment & fill domain after Certbot) ─────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name api.carenearby.ca;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_session_cache   shared:SSL:10m;
  #
  #   include the same location blocks as above
  # }
}
